monolog:
    channels:
        - mail
        - gebruiker
    handlers:
        mail:
            level: debug
            type: stream
            path: php://stderr
            channels: ['mail']
        main:
            type: stream
            path: php://stderr
            level: debug
            channels: ["!event"]
        gebruiker:
            type: stream
            path: php://stderr
            level: debug
            channels: [gebruiker]
        # uncomment to get logging in your browser
        # you may have to allow bigger header sizes in your Web server configuration
        #firephp:
        #    type: firephp
        #    level: info
        #chromephp:
        #    type: chromephp
        #    level: info
        console:
            type:   console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!console"]
